# Note that this feedstock must be paired with bumping the version for
# `pyarrow-feedstock` as well. The two are tightly coupled. This is the CPP
# component/backend, `pyarrow` has the Python libraries. Also, the SHA-256
# hashes should match.
{% set name = "arrow-cpp" %}
{% set version = "23.0.1" %}
{% set build_number = 5 %}
{% set cuda_enabled = (gpu_variant or "").startswith("cuda") %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url: https://archive.apache.org/dist/arrow/arrow-{{ version }}/apache-arrow-{{ version }}.tar.gz
    sha256: bd09adb4feac11fe49d1604f296618866702be610c86e2d513b561d877de6b18

build:
  number: {{ build_number + 100 if cuda_enabled else build_number }}
  string: cuda{{ cuda_compiler_version | replace('.', '') }}_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }} # [cuda_enabled]
  string: cpu_h{{ PKG_HASH }}_{{ PKG_BUILDNUM }} # [not cuda_enabled]
  run_exports:
    - {{ pin_subpackage("arrow-cpp", max_pin="x.x.x") }}
  missing_dso_whitelist:
    - '$RPATH/libpthread.so.*'  # [linux]
    - '$RPATH/libc.so.*'        # [linux]
    - '$RPATH/libdl.so.*'       # [linux]
    - '$RPATH/libm.so.*'        # [linux]
    - '$RPATH/ld64.so.*'        # [linux]
    - "**/libcuda.so*"          # [cuda_enabled]
    - "**/nvcuda.dll"           # [cuda_enabled]
  ignore_run_exports:
    - libbrotlicommon  # need only headers
    - cuda-cudart-dev  # needed for CMake discovery only; Arrow links cuda_driver not cudart

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    # Arrow does not compile .cu files; cuda-nvcc is included so CMake's
    # find_package(CUDAToolkit) can locate the toolkit reliably.
    - {{ compiler('cuda') }}    # [cuda_enabled]
    - autoconf  # [unix]
    - cmake
    # Needed when compiling jemalloc_ep
    - make  # [unix]
    - gnuconfig
    - ninja-base
  host:
    - libabseil 20260107.0
    - aws-sdk-cpp 1.11.826
    - aws-crt-cpp 0.40.1
    - boost-cpp
    - brotli 1.2.0
    - bzip2 1.0.8
    # Only required and used on Windows.
    - c-ares 1.34.6  # [win]
    - glog 0.7.1
    - libgrpc 1.78.0
    - lz4-c 1.9.4
    - openssl 3.5.7
    - orc 2.2.0
    - libprotobuf 6.33.5
    - rapidjson 1.1.0
    - libre2-11 2025.11.05
    - snappy 1.2.2
    - thrift-cpp 0.22.0
    - utf8proc 2.11.3
    - zlib 1.3.2
    - zstd 1.5.7
    - xsimd 13.0.0
    - libbrotlidec 1.2.0
    - libbrotlienc 1.2.0
    - libthrift 0.22.0
    # CUDA dependencies
    - cuda-version 13.3    # [cuda_enabled]
    - cuda-cudart-dev 13.3.29  # [cuda_enabled]
    # cuda-driver-dev only exists for linux on pkgs/main; on Windows, cuda.lib stub
    # ships inside cuda-cudart-dev_win-64 (matches conda-forge libarrow pattern).
    - cuda-driver-dev 13.3.29 # [linux and cuda_enabled]
  run:
    - {{ pin_compatible('utf8proc', max_pin='x') }}
    # Through run_exports
    - aws-crt-cpp
    - aws-sdk-cpp
    - bzip2
    - glog
    - libabseil
    - libbrotlidec
    - libbrotlienc
    - libgrpc
    - libprotobuf
    - libthrift
    - lz4-c
    - openssl
    - orc
    - libre2-11
    - snappy
    - zlib
    - zstd
    - c-ares  # [win]
    # CUDA runtime dependencies
    - {{ pin_compatible('cuda-version', max_pin='x.x') }}  # [cuda_enabled]
  run_constrained:
    # __cuda in run would block downstream packages (e.g. pyarrow) from installing
    # arrow-cpp CUDA as a host dep in build environments without a GPU.
    # Use run_constrained so the solver doesn't require __cuda at build time.
    # Downstream packages (pyarrow) add __cuda to their own run deps.
    - __cuda  # [cuda_enabled]

test:
  requires:
    - conda-build
  commands:
    # headers
    - test -f $PREFIX/include/arrow/api.h              # [unix]
    - test -f $PREFIX/include/arrow/flight/types.h     # [unix]
    - test -f $PREFIX/include/parquet/api/reader.h     # [unix]
    - if not exist %LIBRARY_INC%\\arrow\\api.h exit 1            # [win]
    - if not exist %LIBRARY_INC%\\parquet\\api\\reader.h exit 1  # [win]

    # shared
    - test -f $PREFIX/lib/libarrow${SHLIB_EXT}          # [unix]
    - test -f $PREFIX/lib/libarrow_dataset${SHLIB_EXT}  # [unix]
    - test -f $PREFIX/lib/libarrow_flight${SHLIB_EXT}   # [unix]
    - test -f $PREFIX/lib/libparquet${SHLIB_EXT}        # [unix]
    - if not exist %PREFIX%\\Library\\bin\\arrow.dll exit 1          # [win]
    - if not exist %PREFIX%\\Library\\bin\\arrow_dataset.dll exit 1  # [win]
    - if not exist %PREFIX%\\Library\\bin\\arrow_flight.dll exit 1   # [win]
    - if not exist %PREFIX%\\Library\\bin\\parquet.dll exit 1        # [win]
    # import libraries at the conda-convention path (Library\lib, not Library root)
    - if not exist %PREFIX%\\Library\\lib\\arrow.lib exit 1          # [win]
    - if not exist %PREFIX%\\Library\\lib\\arrow_dataset.lib exit 1  # [win]
    - if not exist %PREFIX%\\Library\\lib\\arrow_flight.lib exit 1   # [win]
    - if not exist %PREFIX%\\Library\\lib\\parquet.lib exit 1        # [win]
    # absence of static libraries
    - test ! -f $PREFIX/lib/libarrow.a         # [unix]
    - test ! -f $PREFIX/lib/libarrow_flight.a  # [unix]
    - test ! -f $PREFIX/lib/libparquet.a       # [unix]
    - if exist %PREFIX%\\Library\\lib\\arrow_static.lib exit 1         # [win]
    - if exist %PREFIX%\\Library\\lib\\arrow_flight_static.lib exit 1  # [win]
    - if exist %PREFIX%\\Library\\lib\\parquet_static.lib exit 1       # [win]

    # CUDA shared libraries and headers
    - test -f $PREFIX/lib/libarrow_cuda${SHLIB_EXT}                                # [unix and cuda_enabled]
    - test -f $PREFIX/include/arrow/gpu/cuda_api.h                                 # [unix and cuda_enabled]
    - if not exist %PREFIX%\\Library\\bin\\arrow_cuda.dll exit 1                   # [win and cuda_enabled]
    - if not exist %PREFIX%\\Library\\lib\\arrow_cuda.lib exit 1                   # [win and cuda_enabled]
    - if not exist %PREFIX%\\Library\\include\\arrow\\gpu\\cuda_api.h exit 1       # [win and cuda_enabled]

    # conda tools
    - conda inspect linkages -p $PREFIX $PKG_NAME  # [not win]
    - conda inspect objects -p $PREFIX $PKG_NAME   # [osx]

about:
  home: https://github.com/apache/arrow
  license: Apache-2.0
  license_file: LICENSE.txt
  license_family: Apache
  summary: C++ libraries for Apache Arrow
  description: |
    Apache Arrow defines a language-independent columnar memory format
    for flat and hierarchical data, organized for efficient analytic operations
    on modern hardware like CPUs and GPUs.
  dev_url: https://github.com/apache/arrow
  doc_url: https://arrow.apache.org

extra:
  skip-lints:
    # There are no Python tests for this project. All tests are executed as
    # shell scripts.
    - missing_imports_or_run_test_py
  recipe-maintainers:
    - wesm
    - xhochy
    - leifwalsh
    - jreback
    - cpcloud
    - pcmoritz
    - robertnishihara
    - siddharthteotia
    - kou
    - kszucs
    - pitrou
