bot:
  abi_migration_branches:
  - 23.x
  - 22.x
  - 21.x
build_platform:
  linux_aarch64: linux_64
  linux_ppc64le: linux_64
  osx_arm64: osx_64
conda_build:
  pkg_format: '2'
# DO NOT MERGE
conda_forge_output_validation: false
github:
  branch_name: main
  tooling_branch_name: main
provider:
  linux_aarch64: azure
  linux_ppc64le: azure
test: native_and_emulated
workflow_settings:
  build_workspace_dir:
  - os: win
    value: C:\bld
  free_disk_space:
  - os: linux
    value: quick
  pagefile_size:
  - value: 16
  tools_install_dir:
  - os: win
    value: C:\Miniforge
